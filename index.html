<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Music Bingo (White Star)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap');
  :root{
    --bg:#14111c; --bg-2:#1d1828; --pink:#ff3d7f; --gold:#ffd23f;
    --violet:#8b7fd1; --ink:#f2eef7; --ink-dim:#b6adc9; --line:rgba(242,238,247,0.10);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Space Grotesk', sans-serif;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(255,61,127,0.18), transparent),
      radial-gradient(ellipse 60% 50% at 100% 100%, rgba(139,127,209,0.14), transparent),
      var(--bg);
    color:var(--ink); min-height:100vh; padding:20px 14px 60px;
  }
  .mb-title{
    font-family:'Bebas Neue', sans-serif; letter-spacing:2px; font-size:38px;
    text-align:center; line-height:1; margin:6px 0 2px;
    background:linear-gradient(90deg, var(--pink), var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .mb-sub{text-align:center; color:var(--ink-dim); font-size:13px; margin-bottom:22px;}
  .mb-tabs{display:flex; gap:8px; max-width:460px; margin:0 auto 22px; background:var(--bg-2); padding:5px; border-radius:14px; border:1px solid var(--line);}
  .mb-tab{flex:1; text-align:center; padding:10px 0; border-radius:10px; font-weight:700; font-size:13px; cursor:pointer; color:var(--ink-dim);}
  .mb-tab.active{background:var(--pink); color:#1a0f16;}
  .mb-card{max-width:460px; margin:0 auto 16px; background:var(--bg-2); border:1px solid var(--line); border-radius:18px; padding:20px;}
  .mb-label{font-size:12px; text-transform:uppercase; letter-spacing:1.2px; color:var(--ink-dim); margin-bottom:6px; display:block;}
  textarea.mb-input, input.mb-input{width:100%; background:#0f0c16; border:1px solid var(--line); border-radius:10px; color:var(--ink); padding:11px 12px; font-family:inherit; font-size:14px; resize:vertical;}
  input.mb-code{text-transform:uppercase; letter-spacing:2px; font-weight:700; text-align:center;}
  .mb-btn{width:100%; border:none; border-radius:12px; padding:13px 0; font-weight:700; font-size:15px; cursor:pointer; margin-top:12px;}
  .mb-btn:active{transform:scale(0.98);}
  .mb-btn-sm{width:auto; padding:8px 14px; font-size:13px; margin-top:0;}
  .mb-btn-primary{background:linear-gradient(90deg,var(--pink),#ff6a9a); color:#1a0f16;}
  .mb-btn-ghost{background:transparent; border:1px solid var(--line); color:var(--ink);}
  .mb-btn-gold{background:var(--gold); color:#1a0f16;}
  .mb-btn-danger{background:transparent; border:1px solid rgba(255,61,127,0.4); color:var(--pink);}
  .mb-btn:disabled{opacity:0.4; cursor:not-allowed;}
  .mb-code-display{font-family:'Bebas Neue', sans-serif; font-size:52px; letter-spacing:10px; text-align:center; color:var(--gold); text-shadow:0 0 24px rgba(255,210,63,0.5); margin:6px 0 2px;}
  .mb-code-hint{text-align:center; color:var(--ink-dim); font-size:12px; margin-bottom:6px;}
  .mb-song-row{display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--line); font-size:13px; gap:8px;}
  .mb-song-row.revealed{color:var(--gold);}
  .mb-badge{font-size:10px; padding:2px 8px; border-radius:20px; background:rgba(255,210,63,0.15); color:var(--gold); font-weight:700; white-space:nowrap;}
  .mb-remove{color:var(--pink); cursor:pointer; font-size:16px; font-weight:700; padding:0 4px;}
  .mb-grid{display:grid; gap:6px; margin-top:6px;}
  .mb-cell{aspect-ratio:1; display:flex; align-items:center; justify-content:center; text-align:center; font-size:10.5px; line-height:1.15; padding:4px; border-radius:9px; background:#0f0c16; border:1px solid var(--line); color:var(--ink-dim); transition:all .25s ease;}
  .mb-cell.hit{background:radial-gradient(circle, var(--pink), #c2255f); color:#fff; border-color:var(--pink); box-shadow:0 0 14px rgba(255,61,127,0.55); transform:scale(1.03);}
  .mb-cell.free{background:linear-gradient(160deg, var(--gold), #d8ab1f); color:#1a0f16; font-weight:700; border-color:var(--gold);}
  .mb-bingo-banner{text-align:center; font-family:'Bebas Neue', sans-serif; font-size:34px; letter-spacing:4px; color:var(--gold); text-shadow:0 0 20px rgba(255,210,63,0.6); margin:10px 0 4px; animation:mbPulse 1s ease-in-out infinite;}
  @keyframes mbPulse{0%,100%{transform:scale(1);} 50%{transform:scale(1.05);}}
  .mb-error{color:var(--pink); font-size:13px; margin-top:8px; text-align:center;}
  .mb-note{color:var(--ink-dim); font-size:11.5px; margin-top:10px; line-height:1.5;}
  .mb-row2{display:flex; gap:10px;}
  .mb-row2 > *{flex:1;}
  .mb-pill{display:inline-block; background:rgba(139,127,209,0.18); color:var(--violet); font-size:12px; font-weight:700; padding:4px 12px; border-radius:20px; margin:0 auto 10px; text-align:center;}
  .mb-pill-wrap{text-align:center;}
  .mb-qr{display:block; margin:10px auto; border-radius:14px; background:#fff; padding:10px;}
  .mb-screen-code{font-family:'Bebas Neue', sans-serif; font-size:72px; letter-spacing:14px; text-align:center; color:var(--gold); text-shadow:0 0 30px rgba(255,210,63,0.5);}
  .mb-now-playing{text-align:center; font-size:16px; color:var(--ink); margin-top:14px; min-height:22px;}
  .mb-winner-banner{text-align:center; font-family:'Bebas Neue', sans-serif; font-size:44px; letter-spacing:3px; color:var(--gold); text-shadow:0 0 30px rgba(255,210,63,0.7); margin:16px 0 4px; animation:mbPulse 0.8s ease-in-out infinite;}
  .mb-subtabs{display:flex; gap:6px; margin-bottom:14px;}
  .mb-subtab{flex:1; text-align:center; padding:8px 0; border-radius:8px; font-size:12.5px; font-weight:700; cursor:pointer; color:var(--ink-dim); border:1px solid var(--line);}
  .mb-subtab.active{background:rgba(255,61,127,0.15); color:var(--pink); border-color:var(--pink);}
  .mb-folder-card{border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:10px;}
  .mb-folder-head{display:flex; justify-content:space-between; align-items:center;}
  .mb-folder-name{font-weight:700; font-size:14px;}
  .mb-folder-count{color:var(--ink-dim); font-size:12px;}
  .mb-folder-actions{display:flex; gap:6px; margin-top:10px;}
</style>
</head>
<body>
  <div class="mb-title">MUSIC BINGO</div>
  <div class="mb-sub">ведущий включает — игроки отмечают с телефона</div>
  <div class="mb-tabs">
    <div class="mb-tab active" data-tab="host">Ведущий</div>
    <div class="mb-tab" data-tab="join">Игрок</div>
    <div class="mb-tab" data-tab="screen">Экран</div>
  </div>
  <div id="mb-view"></div>
  <audio id="mb-audio" style="display:none;"></audio>

<script src="/socket.io/socket.io.js"></script>
<script>
(function(){
  const socket = io();
  const root = document.getElementById('mb-view');
  const tabs = document.querySelectorAll('.mb-tab');
  const audioEl = document.getElementById('mb-audio');
  let audioUnlocked = false;

  const LS_KEY = 'mb_session_v1';
  function saveSession(obj){ try{ localStorage.setItem(LS_KEY, JSON.stringify(obj)); }catch(e){} }
  function loadSession(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)); }catch(e){ return null; } }
  function clearSession(){ try{ localStorage.removeItem(LS_KEY); }catch(e){} }

  function playCurrentSong(song){
    if(!song || !song.url || !audioUnlocked) return;
    audioEl.src = song.url;
    audioEl.play().catch(()=>{});
  }

  const urlParams = new URLSearchParams(location.search);

  function gridSizeFor(n){
    if(n>=24) return 5;
    if(n>=16) return 4;
    if(n>=9) return 3;
    return 0;
  }
  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }
  function setActiveTab(name){
    tabs.forEach(x => x.classList.toggle('active', x.dataset.tab === name));
  }

  // ======================================================================
  // HOST
  // ======================================================================
  function renderHost(){
    root.innerHTML = `
      <div class="mb-card" id="mb-host-setup">
        <div class="mb-subtabs">
          <div class="mb-subtab active" data-sub="library">Из библиотеки</div>
          <div class="mb-subtab" data-sub="quick">Быстрый список</div>
        </div>
        <div id="mb-host-sub"></div>
        <div class="mb-error" id="mb-host-error"></div>
      </div>
      <div class="mb-card" id="mb-host-game" style="display:none;"></div>
    `;
    document.querySelectorAll('.mb-subtab').forEach(t => t.onclick = () => {
      document.querySelectorAll('.mb-subtab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      if(t.dataset.sub === 'library') drawLibrarySection(); else drawQuickSection();
    });
    drawLibrarySection();
  }

  function startGame(code, songs){
    saveSession({ role:'host', code });
    document.getElementById('mb-host-setup').style.display = 'none';
    audioUnlocked = true;
    audioEl.play().catch(()=>{});
    renderHostGame(code, songs, { revealed: [], winner: null, playerCount: 0 });
  }

  // ---- Quick manual list (ephemeral, no persistence, no audio) ----
  function drawQuickSection(){
    const box = document.getElementById('mb-host-sub');
    box.innerHTML = `
      <label class="mb-label">Список песен (одна на строку, минимум 9)</label>
      <textarea class="mb-input" id="mb-manual" rows="8" placeholder="Queen — Bohemian Rhapsody"></textarea>
      <button class="mb-btn mb-btn-primary" id="mb-quick-create">Создать игру</button>
      <div class="mb-note">Без загрузки файлов — просто список названий, звук ведущий включает сам.</div>
    `;
    document.getElementById('mb-quick-create').onclick = () => {
      const err = document.getElementById('mb-host-error');
      err.textContent = '';
      const raw = document.getElementById('mb-manual').value;
      const songs = raw.split('\n').map(s=>s.trim()).filter(Boolean).map(title => ({ title, url: null }));
      if(songs.length < 9){ err.textContent = 'Нужно минимум 9 песен.'; return; }
      socket.emit('create_game', songs, (res) => {
        if(res.error){ err.textContent = res.error; return; }
        startGame(res.code, res.songs);
      });
    };
  }

  // ---- Library (persistent folders on the server) ----
  async function fetchLibrary(){
    const res = await fetch('/api/library');
    return res.json();
  }

  function drawLibrarySection(){
    const box = document.getElementById('mb-host-sub');
    box.innerHTML = `<div class="mb-note">Загрузка библиотеки...</div>`;
    fetchLibrary().then(lib => renderLibraryList(lib)).catch(() => {
      box.innerHTML = `<div class="mb-error">Не удалось загрузить библиотеку.</div>`;
    });
  }

  function renderLibraryList(lib){
    const box = document.getElementById('mb-host-sub');
    const slugs = Object.keys(lib);
    box.innerHTML = `
      <div class="mb-row2" style="margin-bottom:14px;">
        <input class="mb-input" id="mb-new-folder-name" placeholder="Название новой папки (например NEW YEAR)">
        <button class="mb-btn mb-btn-ghost mb-btn-sm" id="mb-new-folder-btn" style="flex:0 0 auto;">+ Папка</button>
      </div>
      <div id="mb-folder-list">
        ${slugs.length === 0 ? '<div class="mb-note">Папок пока нет — создайте первую.</div>' : ''}
        ${slugs.map(slug => `
          <div class="mb-folder-card" data-slug="${slug}">
            <div class="mb-folder-head">
              <span class="mb-folder-name">${lib[slug].name}</span>
              <span class="mb-folder-count">${lib[slug].count} песен</span>
            </div>
            <div class="mb-folder-actions">
              <button class="mb-btn mb-btn-primary mb-btn-sm mb-act-play" data-slug="${slug}" data-count="${lib[slug].count}">Создать игру</button>
              <button class="mb-btn mb-btn-ghost mb-btn-sm mb-act-manage" data-slug="${slug}" data-name="${lib[slug].name}">Управлять</button>
            </div>
            <div class="mb-folder-expand" data-slug="${slug}" style="display:none; margin-top:12px;"></div>
          </div>
        `).join('')}
      </div>
    `;
    document.getElementById('mb-new-folder-btn').onclick = async () => {
      const name = document.getElementById('mb-new-folder-name').value.trim();
      if(!name) return;
      await fetch('/api/library/folder', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name })
      });
      drawLibrarySection();
    };
    box.querySelectorAll('.mb-act-play').forEach(btn => {
      btn.onclick = () => showPlayPrompt(btn.dataset.slug, +btn.dataset.count);
    });
    box.querySelectorAll('.mb-act-manage').forEach(btn => {
      btn.onclick = () => toggleManage(btn.dataset.slug, btn.dataset.name);
    });
  }

  function showPlayPrompt(slug, count){
    const card = document.querySelector(`.mb-folder-card[data-slug="${slug}"] .mb-folder-expand`);
    card.style.display = 'block';
    const defaultN = Math.min(20, count);
    card.innerHTML = `
      <label class="mb-label">Сколько песен взять (из ${count})</label>
      <input class="mb-input" type="number" id="mb-count-${slug}" value="${defaultN}" min="9" max="${count}">
      <button class="mb-btn mb-btn-primary mb-btn-sm" id="mb-start-${slug}" style="width:100%; margin-top:10px;">Начать игру</button>
    `;
    document.getElementById(`mb-start-${slug}`).onclick = () => {
      const n = +document.getElementById(`mb-count-${slug}`).value || defaultN;
      const err = document.getElementById('mb-host-error');
      err.textContent = '';
      socket.emit('create_game_from_folder', { slug, count: n }, (res) => {
        if(res.error){ err.textContent = res.error; return; }
        startGame(res.code, res.songs);
      });
    };
  }

  function toggleManage(slug, name){
    const card = document.querySelector(`.mb-folder-card[data-slug="${slug}"] .mb-folder-expand`);
    const isOpen = card.style.display === 'block' && card.dataset.mode === 'manage';
    if(isOpen){ card.style.display = 'none'; return; }
    card.dataset.mode = 'manage';
    card.style.display = 'block';
    card.innerHTML = `<div class="mb-note">Загрузка...</div>`;
    fetch('/api/library/' + slug).then(r=>r.json()).then(data => {
      card.innerHTML = `
        <label class="mb-label">Загрузить mp3 в «${name}»</label>
        <input type="file" id="mb-upload-${slug}" accept="audio/*" multiple class="mb-input" style="padding:8px;">
        <div class="mb-note" id="mb-upload-status-${slug}"></div>
        <div style="margin-top:10px; max-height:220px; overflow-y:auto;">
          ${(data.songs||[]).map(s => `
            <div class="mb-song-row">
              <span>${s.title}</span>
              <span class="mb-remove" data-slug="${slug}" data-url="${s.url}">✕</span>
            </div>`).join('') || '<div class="mb-note">Пока нет песен.</div>'}
        </div>
        <button class="mb-btn mb-btn-danger mb-btn-sm" id="mb-delete-folder-${slug}" style="width:100%; margin-top:12px;">Удалить папку целиком</button>
      `;
      document.getElementById(`mb-upload-${slug}`).onchange = async (e) => {
        const files = Array.from(e.target.files || []);
        if(files.length === 0) return;
        const status = document.getElementById(`mb-upload-status-${slug}`);
        status.textContent = 'Загрузка ' + files.length + ' файлов...';
        const fd = new FormData();
        files.forEach(f => fd.append('songs', f));
        fd.append('folderName', name);
        await fetch('/api/library/' + slug + '/upload', { method:'POST', body: fd });
        status.textContent = 'Готово.';
        drawLibrarySection();
      };
      card.querySelectorAll('.mb-remove').forEach(el => {
        el.onclick = async () => {
          await fetch('/api/library/' + el.dataset.slug + '/song', {
            method:'DELETE', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ url: el.dataset.url })
          });
          drawLibrarySection();
        };
      });
      document.getElementById(`mb-delete-folder-${slug}`).onclick = async () => {
        if(!confirm('Удалить папку «' + name + '» вместе со всеми песнями?')) return;
        await fetch('/api/library/' + slug, { method:'DELETE' });
        drawLibrarySection();
      };
    });
  }

  function renderHostGame(code, songs, initial){
    const panel = document.getElementById('mb-host-game');
    panel.style.display = 'block';
    let revealed = initial.revealed || [];
    let playerCount = initial.playerCount || 0;
    let winner = initial.winner || null;

    function draw(){
      const remaining = songs.filter(s => !revealed.includes(s.title));
      panel.innerHTML = `
        <div class="mb-code-hint">Код игры — сообщите игрокам:</div>
        <div class="mb-code-display">${code}</div>
        <div class="mb-pill-wrap"><span class="mb-pill">Игроков онлайн: ${playerCount}</span></div>
        ${winner ? `<div class="mb-winner-banner">🏆 ${winner}</div>` : ''}
        <div class="mb-row2">
          <button class="mb-btn mb-btn-primary" id="mb-next" ${remaining.length===0?'disabled':''}>Следующая песня</button>
          <button class="mb-btn mb-btn-ghost" id="mb-reset">Сброс</button>
        </div>
        <button class="mb-btn mb-btn-danger" id="mb-leave">Завершить игру</button>
        <div style="margin-top:16px;">
          ${songs.map(s => `<div class="mb-song-row ${revealed.includes(s.title)?'revealed':''}">
              <span>${s.title}${s.url?' 🔊':''}</span>${revealed.includes(s.title)?'<span class="mb-badge">прозвучала</span>':''}
            </div>`).join('')}
        </div>
        <div class="mb-note">Прозвучало: ${revealed.length} / ${songs.length}</div>
      `;
      document.getElementById('mb-next').onclick = () => {
        socket.emit('reveal_next', code, (res) => {
          if(res.error) return;
          revealed = res.revealed;
          playCurrentSong(res.currentSong);
          draw();
        });
      };
      document.getElementById('mb-reset').onclick = () => {
        if(!confirm('Сбросить все отметки для игры ' + code + '?')) return;
        socket.emit('reset_game', code, () => { revealed = []; winner = null; draw(); });
      };
      document.getElementById('mb-leave').onclick = () => {
        if(!confirm('Завершить текущую игру? Код перестанет быть активным на этом экране.')) return;
        clearSession();
        location.reload();
      };
    }
    draw();
    socket.on('players_update', (data) => { playerCount = data.count; draw(); });
    socket.on('winner_update', (data) => { winner = data.winner; draw(); });
  }

  function resumeHost(code){
    socket.emit('host_rejoin', code, (res) => {
      if(res.error){ clearSession(); renderHost(); return; }
      root.innerHTML = `<div class="mb-card" id="mb-host-setup" style="display:none;"></div><div class="mb-card" id="mb-host-game"></div>`;
      renderHostGame(code, res.songs, { revealed: res.revealed, winner: res.winner, playerCount: res.playerCount });
    });
  }

  // ======================================================================
  // JOIN (player)
  // ======================================================================
  function renderJoin(){
    const prefillCode = urlParams.get('code') || '';
    root.innerHTML = `
      <div class="mb-card">
        <label class="mb-label">Ваше имя</label>
        <input class="mb-input" id="mb-name-input" placeholder="Имя" style="margin-bottom:12px;">
        <label class="mb-label">Код игры</label>
        <input class="mb-input mb-code" id="mb-code-input" maxlength="4" value="${prefillCode}" placeholder="XXXX">
        <button class="mb-btn mb-btn-primary" id="mb-join-btn" style="margin-top:14px;">Войти в игру</button>
        <div class="mb-error" id="mb-join-error"></div>
      </div>
      <div class="mb-card" id="mb-join-game" style="display:none;"></div>
    `;
    document.getElementById('mb-join-btn').onclick = () => {
      const code = document.getElementById('mb-code-input').value.trim().toUpperCase();
      const name = document.getElementById('mb-name-input').value.trim() || 'Игрок';
      doJoin(code, name);
    };
  }

  function doJoin(code, name){
    const err = document.getElementById('mb-join-error');
    if(err) err.textContent = '';
    if(code.length !== 4){ if(err) err.textContent = 'Код — 4 символа.'; return; }
    socket.emit('join_game', code, name, (res) => {
      if(res.error){
        if(err) err.textContent = res.error;
        clearSession();
        return;
      }
      const size = gridSizeFor(res.songs.length);
      if(size === 0){ if(err) err.textContent = 'В этой игре пока маловато песен для карточки.'; return; }
      saveSession({ role:'player', code, name });
      const firstCard = root.querySelector('.mb-card');
      if(firstCard) firstCard.style.display = 'none';
      if(!document.getElementById('mb-join-game')){
        root.innerHTML = `<div class="mb-card" id="mb-join-game"></div>`;
      }
      startPlayerCard(code, name, res.songs, res.revealed, res.winner, size);
    });
  }

  function resumePlayer(code, name){
    root.innerHTML = `<div class="mb-card" id="mb-join-game"></div>`;
    doJoin(code, name);
  }

  function startPlayerCard(code, myName, songs, initialRevealed, initialWinner, size){
    const total = size*size;
    const freeIndex = size % 2 === 1 ? Math.floor(total/2) : -1;
    const chosen = shuffle(songs).slice(0, total);
    const panel = document.getElementById('mb-join-game');
    panel.style.display = 'block';
    let revealed = initialRevealed;
    let winner = initialWinner;
    let claimed = false;

    function checkBingo(hitMask){
      for(let r=0;r<size;r++){
        let row=true, col=true;
        for(let c=0;c<size;c++){
          if(!hitMask[r*size+c]) row=false;
          if(!hitMask[c*size+r]) col=false;
        }
        if(row||col) return true;
      }
      let d1=true, d2=true;
      for(let i=0;i<size;i++){
        if(!hitMask[i*size+i]) d1=false;
        if(!hitMask[i*size+(size-1-i)]) d2=false;
      }
      return d1||d2;
    }

    function draw(){
      const revealedSet = new Set(revealed);
      const hitMask = chosen.map((s,i) => i===freeIndex || revealedSet.has(s));
      const bingo = checkBingo(hitMask);
      panel.innerHTML = `
        ${winner ? `<div class="mb-winner-banner">🏆 ${winner}</div>` : (bingo ? '<div class="mb-bingo-banner">БИНГО! 🎉</div>' : '')}
        <div class="mb-code-hint">Код игры: ${code} · прозвучало ${revealed.length} / ${songs.length}</div>
        <div class="mb-grid" style="grid-template-columns:repeat(${size},1fr);">
          ${chosen.map((s,i)=>`<div class="mb-cell ${i===freeIndex?'free':(hitMask[i]?'hit':'')}">${i===freeIndex?'★':s}</div>`).join('')}
        </div>
        ${(bingo && !winner) ? `<button class="mb-btn mb-btn-gold" id="mb-claim" ${claimed?'disabled':''}>${claimed?'Заявка отправлена':'Заявить BINGO!'}</button>` : ''}
        <button class="mb-btn mb-btn-danger" id="mb-leave-player">Покинуть игру</button>
        <div class="mb-note">Карточка обновляется мгновенно, когда ведущий отмечает новую песню.</div>
      `;
      const claimBtn = document.getElementById('mb-claim');
      if(claimBtn){
        claimBtn.onclick = () => {
          claimed = true;
          socket.emit('claim_bingo', code, myName);
          draw();
        };
      }
      document.getElementById('mb-leave-player').onclick = () => {
        clearSession();
        location.reload();
      };
    }
    draw();
    socket.on('game_update', (data) => { revealed = data.revealed; draw(); });
    socket.on('winner_update', (data) => { winner = data.winner; draw(); });
  }

  // ======================================================================
  // SCREEN (TV)
  // ======================================================================
  function renderScreen(){
    const prefillCode = urlParams.get('code') || '';
    root.innerHTML = `
      <div class="mb-card" id="mb-screen-setup">
        <label class="mb-label">Код игры</label>
        <input class="mb-input mb-code" id="mb-screen-code" maxlength="4" value="${prefillCode}" placeholder="XXXX">
        <button class="mb-btn mb-btn-primary" id="mb-screen-go">Показать</button>
        <div class="mb-error" id="mb-screen-error"></div>
      </div>
      <div id="mb-screen-view" style="display:none;"></div>
    `;
    document.getElementById('mb-screen-go').onclick = () => {
      const code = document.getElementById('mb-screen-code').value.trim().toUpperCase();
      goScreen(code);
    };
  }

  function goScreen(code){
    const err = document.getElementById('mb-screen-error');
    if(code.length !== 4){ if(err) err.textContent = 'Код — 4 символа.'; return; }
    socket.emit('join_game', code, '__screen__', (res) => {
      if(res.error){ if(err) err.textContent = res.error; clearSession(); return; }
      saveSession({ role:'screen', code });
      const setup = document.getElementById('mb-screen-setup');
      if(setup) setup.style.display = 'none';
      if(!document.getElementById('mb-screen-view')){
        root.innerHTML = `<div id="mb-screen-view"></div>`;
      }
      showScreen(code, res.winner);
    });
  }

  function resumeScreen(code){
    root.innerHTML = `<div id="mb-screen-view"></div>`;
    goScreen(code);
  }

  function showScreen(code, initialWinner){
    const view = document.getElementById('mb-screen-view');
    view.style.display = 'block';
    const joinUrl = location.origin + '/?tab=join&code=' + code;
    const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=' + encodeURIComponent(joinUrl);
    let playerCount = 0;
    let winner = initialWinner;
    let lastSong = null;
    let unlocked = false;

    function draw(){
      view.innerHTML = `
        <div class="mb-card">
          <img class="mb-qr" src="${qrUrl}" width="240" height="240" alt="QR">
          <div class="mb-screen-code">${code}</div>
          <div class="mb-pill-wrap"><span class="mb-pill">Игроков онлайн: ${playerCount}</span></div>
          ${winner ? `<div class="mb-winner-banner">🏆 ${winner}</div>` : (lastSong ? `<div class="mb-now-playing">Сейчас играет: ${lastSong}</div>` : '')}
          ${!unlocked ? `<button class="mb-btn mb-btn-ghost" id="mb-enable-sound">Включить звук на этом экране</button>` : ''}
        </div>
      `;
      const soundBtn = document.getElementById('mb-enable-sound');
      if(soundBtn){
        soundBtn.onclick = () => { unlocked = true; audioUnlocked = true; audioEl.play().catch(()=>{}); draw(); };
      }
    }
    draw();
    socket.on('players_update', (data) => { playerCount = data.count; draw(); });
    socket.on('winner_update', (data) => { winner = data.winner; draw(); });
    socket.on('game_update', (data) => {
      lastSong = data.currentSong ? data.currentSong.title : lastSong;
      if(unlocked) playCurrentSong(data.currentSong);
      draw();
    });
  }

  // ======================================================================
  // Tab wiring + startup
  // ======================================================================
  tabs.forEach(t => t.addEventListener('click', () => {
    setActiveTab(t.dataset.tab);
    const tab = t.dataset.tab;
    if(tab==='host') renderHost();
    else if(tab==='join') renderJoin();
    else renderScreen();
  }));

  const session = loadSession();
  if(session && session.role === 'host' && session.code){
    setActiveTab('host');
    root.innerHTML = `<div class="mb-card" id="mb-host-setup" style="display:none;"></div><div class="mb-card" id="mb-host-game"></div>`;
    resumeHost(session.code);
  } else if(session && session.role === 'player' && session.code){
    setActiveTab('join');
    resumePlayer(session.code, session.name);
  } else if(session && session.role === 'screen' && session.code){
    setActiveTab('screen');
    resumeScreen(session.code);
  } else if(urlParams.get('tab') === 'join'){
    setActiveTab('join');
    renderJoin();
  } else {
    renderHost();
  }
})();
</script>
</body>
</html>
