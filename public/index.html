<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Music Bingo - White Star Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&display=swap');
:root{--bg:#0a0a0f;--bg-2:#12121a;--bg-3:#1a1a28;--bg-4:#222236;--pink:#ff2d78;--pink-glow:rgba(255,45,120,0.35);--gold:#ffd700;--gold-glow:rgba(255,215,0,0.35);--cyan:#00e5ff;--cyan-glow:rgba(0,229,255,0.25);--violet:#a855f7;--violet-glow:rgba(168,85,247,0.25);--green:#00e676;--green-glow:rgba(0,230,118,0.25);--orange:#ff9100;--orange-glow:rgba(255,145,0,0.25);--ink:#f0f0f5;--ink-dim:#8a8aa0;--ink-faint:#55556b;--line:rgba(255,255,255,0.06);--line-strong:rgba(255,255,255,0.12);--radius:16px;--radius-sm:10px;}
*{box-sizing:border-box;margin:0;padding:0;}html{scroll-behavior:smooth;}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;}
.bg-orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.15;pointer-events:none;z-index:0;animation:orbFloat 20s ease-in-out infinite;}
.bg-orb-1{width:600px;height:600px;background:var(--pink);top:-200px;left:-200px;animation-delay:0s;}
.bg-orb-2{width:500px;height:500px;background:var(--violet);bottom:-150px;right:-150px;animation-delay:-7s;}
.bg-orb-3{width:400px;height:400px;background:var(--cyan);top:40%;left:60%;animation-delay:-14s;}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(30px,-40px) scale(1.1);}66%{transform:translate(-20px,30px) scale(0.95);}}
.particles{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
.particle{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:0;animation:particleRise 8s linear infinite;}
@keyframes particleRise{0%{transform:translateY(100vh) scale(0);opacity:0;}10%{opacity:0.6;}90%{opacity:0.6;}100%{transform:translateY(-10vh) scale(1);opacity:0;}}
.app{position:relative;z-index:2;max-width:520px;margin:0 auto;padding:16px;}
.app-wide{max-width:900px;}
.logo-wrap{text-align:center;padding:24px 0 8px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:6px;background:linear-gradient(135deg,var(--pink),var(--gold),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 40px var(--pink-glow);line-height:1;}
.logo-sub{font-size:12.5px;color:var(--ink-dim);letter-spacing:3px;text-transform:uppercase;margin-top:4px;font-weight:500;}
.tabs{display:flex;gap:6px;background:var(--bg-2);padding:5px;border-radius:var(--radius);border:1px solid var(--line);margin:20px 0 16px;}
.tab{flex:1;text-align:center;padding:12px 0;border-radius:var(--radius-sm);font-weight:700;font-size:13px;cursor:pointer;color:var(--ink-dim);transition:all .25s ease;position:relative;overflow:hidden;}
.tab:hover{color:var(--ink);}
.tab.active{background:linear-gradient(135deg,var(--pink),#ff5c9a);color:#fff;box-shadow:0 4px 20px var(--pink-glow);}
.tab .tab-icon{font-size:16px;display:block;margin-bottom:2px;}
.card{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:14px;backdrop-filter:blur(10px);transition:all .3s ease;}
.card:hover{border-color:var(--line-strong);}
.card-glow-pink{box-shadow:0 0 30px rgba(255,45,120,0.08);border-color:rgba(255,45,120,0.15);}
.card-glow-gold{box-shadow:0 0 30px rgba(255,215,0,0.08);border-color:rgba(255,215,0,0.15);}
.label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink-dim);margin-bottom:8px;display:block;font-weight:600;}
.title-lg{font-family:'Bebas Neue';font-size:36px;letter-spacing:3px;text-align:center;}
.title-md{font-family:'Bebas Neue';font-size:28px;letter-spacing:2px;}
.title-sm{font-weight:700;font-size:16px;}
.text-dim{color:var(--ink-dim);font-size:13px;line-height:1.6;}
.text-faint{color:var(--ink-faint);font-size:12px;}
.input{width:100%;background:var(--bg-3);border:1px solid var(--line);border-radius:var(--radius-sm);color:var(--ink);padding:13px 14px;font-family:inherit;font-size:14px;transition:all .2s ease;}
.input:focus{outline:none;border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,45,120,0.1);}
.input::placeholder{color:var(--ink-faint);}
textarea.input{resize:vertical;min-height:100px;}
.input-code{text-transform:uppercase;letter-spacing:6px;font-weight:800;text-align:center;font-size:20px;}
.btn{width:100%;border:none;border-radius:var(--radius-sm);padding:14px 0;font-weight:700;font-size:15px;cursor:pointer;transition:all .2s ease;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:active{transform:scale(0.97);}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.btn-sm{width:auto;padding:9px 16px;font-size:13px;}
.btn-pink{background:linear-gradient(135deg,var(--pink),#ff5c9a);color:#fff;box-shadow:0 4px 20px var(--pink-glow);}
.btn-pink:hover{box-shadow:0 6px 30px var(--pink-glow);transform:translateY(-1px);}
.btn-gold{background:linear-gradient(135deg,var(--gold),#ffaa00);color:#1a0f00;box-shadow:0 4px 20px var(--gold-glow);}
.btn-gold:hover{box-shadow:0 6px 30px var(--gold-glow);transform:translateY(-1px);}
.btn-cyan{background:linear-gradient(135deg,var(--cyan),#00b8d4);color:#001a1f;box-shadow:0 4px 20px var(--cyan-glow);}
.btn-green{background:linear-gradient(135deg,var(--green),#00c853);color:#001f0a;box-shadow:0 4px 20px var(--green-glow);}
.btn-orange{background:linear-gradient(135deg,var(--orange),#ff6d00);color:#1a0f00;box-shadow:0 4px 20px var(--orange-glow);}
.btn-ghost{background:transparent;border:1px solid var(--line-strong);color:var(--ink);}
.btn-ghost:hover{background:var(--bg-3);border-color:var(--ink-dim);}
.btn-danger{background:transparent;border:1px solid rgba(255,45,120,0.3);color:var(--pink);}
.btn-danger:hover{background:rgba(255,45,120,0.08);}
.code-display{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:12px;text-align:center;color:var(--gold);text-shadow:0 0 30px var(--gold-glow);margin:8px 0 4px;line-height:1;}
.code-hint{text-align:center;color:var(--ink-dim);font-size:12px;margin-bottom:6px;}
.share-row{display:flex;gap:8px;align-items:center;background:var(--bg-3);border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 12px;margin-top:10px;}
.share-row input{border:none;background:transparent;color:var(--ink);flex:1;font-size:12.5px;padding:0;font-family:inherit;}
.share-row .copy-btn{background:var(--bg-4);border:none;color:var(--ink-dim);padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:600;white-space:nowrap;}
.share-row .copy-btn:hover{background:var(--pink);color:#fff;}
.song-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:13px;gap:8px;}
.song-row:last-child{border-bottom:none;}
.song-row.revealed{color:var(--gold);}
.song-row .song-info{flex:1;min-width:0;}
.song-row .song-title{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.song-row .song-artist{font-size:11px;color:var(--ink-dim);}
.badge{font-size:10px;padding:3px 10px;border-radius:20px;background:rgba(255,215,0,0.12);color:var(--gold);font-weight:700;white-space:nowrap;}
.badge-pink{background:rgba(255,45,120,0.12);color:var(--pink);}
.badge-cyan{background:rgba(0,229,255,0.12);color:var(--cyan);}
.badge-green{background:rgba(0,230,118,0.12);color:var(--green);}
.remove{color:var(--pink);cursor:pointer;font-size:18px;font-weight:700;padding:0 6px;opacity:0.7;}
.remove:hover{opacity:1;}
.grid-wrap{margin-top:10px;}
.grid{display:grid;gap:8px;margin-top:8px;}
.cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;text-align:center;font-size:11px;line-height:1.2;padding:5px;border-radius:var(--radius-sm);background:var(--bg-3);border:1.5px solid var(--line);color:var(--ink-faint);transition:all .25s cubic-bezier(.4,0,.2,1);cursor:default;position:relative;overflow:hidden;font-weight:500;}
.cell.ready{opacity:1;border-color:var(--gold);box-shadow:0 0 12px var(--gold-glow);cursor:pointer;color:var(--ink);background:var(--bg-4);}
.cell.ready:hover{transform:scale(1.04);border-color:var(--gold);}
.cell.hit{opacity:1;cursor:pointer;background:linear-gradient(135deg,var(--pink),#c2185b);color:#fff;border-color:var(--pink);box-shadow:0 0 18px var(--pink-glow);transform:scale(1.03);animation:hitPulse 2s ease-in-out infinite;}
@keyframes hitPulse{0%,100%{box-shadow:0 0 18px var(--pink-glow);}50%{box-shadow:0 0 28px var(--pink-glow),0 0 40px rgba(255,45,120,0.15);}}
.cell.free{opacity:1;background:linear-gradient(135deg,var(--gold),#ff8f00);color:#1a0f00;font-weight:800;border-color:var(--gold);box-shadow:0 0 12px var(--gold-glow);}
.bingo-banner{text-align:center;font-family:'Bebas Neue';font-size:42px;letter-spacing:5px;color:var(--gold);text-shadow:0 0 30px var(--gold-glow);margin:14px 0 6px;animation:bingoPop 0.6s cubic-bezier(.175,.885,.32,1.275);}
@keyframes bingoPop{0%{transform:scale(0.3);opacity:0;}100%{transform:scale(1);opacity:1;}}
.winner-banner{text-align:center;font-family:'Bebas Neue';font-size:48px;letter-spacing:4px;color:var(--gold);text-shadow:0 0 40px var(--gold-glow);margin:16px 0 6px;animation:winnerGlow 1.5s ease-in-out infinite;}
@keyframes winnerGlow{0%,100%{text-shadow:0 0 30px var(--gold-glow);transform:scale(1);}50%{text-shadow:0 0 50px var(--gold-glow),0 0 80px rgba(255,215,0,0.2);transform:scale(1.03);}}
.countdown-wrap{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);}
.countdown-num{font-family:'Bebas Neue';font-size:140px;color:var(--gold);text-shadow:0 0 60px var(--gold-glow);animation:countPop 0.8s cubic-bezier(.175,.885,.32,1.275);}
@keyframes countPop{0%{transform:scale(0);opacity:0;}60%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}
.countdown-label{font-size:14px;color:var(--ink-dim);letter-spacing:4px;text-transform:uppercase;margin-top:10px;}
.now-playing{background:linear-gradient(135deg,rgba(255,45,120,0.08),rgba(168,85,247,0.08));border:1px solid rgba(255,45,120,0.15);border-radius:var(--radius);padding:16px;margin:14px 0;text-align:center;}
.now-playing-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--pink);font-weight:700;}
.now-playing-title{font-size:18px;font-weight:700;margin-top:6px;color:var(--ink);}
.now-playing-artist{font-size:13px;color:var(--ink-dim);margin-top:2px;}
.now-playing-bar{height:3px;background:var(--bg-3);border-radius:2px;margin-top:12px;overflow:hidden;}
.now-playing-progress{height:100%;background:linear-gradient(90deg,var(--pink),var(--gold));border-radius:2px;transition:width 1s linear;}
.progress-ring-wrap{display:flex;align-items:center;justify-content:center;margin:10px 0;}
.progress-ring{position:relative;width:60px;height:60px;}
.progress-ring svg{transform:rotate(-90deg);}
.progress-ring-bg{fill:none;stroke:var(--bg-3);stroke-width:4;}
.progress-ring-fill{fill:none;stroke:var(--gold);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1s linear;filter:drop-shadow(0 0 4px var(--gold-glow));}
.progress-ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:18px;color:var(--gold);}
.claim-banner{background:linear-gradient(135deg,rgba(255,215,0,0.08),rgba(255,145,0,0.08));border:1px solid rgba(255,215,0,0.25);border-radius:var(--radius);padding:18px;text-align:center;margin-bottom:14px;animation:claimSlide 0.4s ease-out;}
@keyframes claimSlide{from{transform:translateY(-20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.claim-banner b{color:var(--gold);font-size:16px;}
.claim-banner .claim-actions{display:flex;gap:10px;margin-top:12px;}
.reject-banner{background:rgba(255,45,120,0.08);border:1px solid rgba(255,45,120,0.3);border-radius:var(--radius-sm);padding:12px;text-align:center;font-size:13px;margin-bottom:12px;color:var(--pink);font-weight:500;animation:shake 0.5s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
.pill-wrap{text-align:center;margin:10px 0;}
.pill{display:inline-block;background:var(--bg-3);color:var(--ink-dim);font-size:12px;font-weight:600;padding:5px 14px;border-radius:20px;border:1px solid var(--line);}
.pill-pink{background:rgba(255,45,120,0.1);color:var(--pink);border-color:rgba(255,45,120,0.2);}
.pill-gold{background:rgba(255,215,0,0.1);color:var(--gold);border-color:rgba(255,215,0,0.2);}
.pill-cyan{background:rgba(0,229,255,0.1);color:var(--cyan);border-color:rgba(0,229,255,0.2);}
.row2{display:flex;gap:10px;}
.row2 > *{flex:1;}
.row3{display:flex;gap:8px;}
.row3 > *{flex:1;}
.subtabs{display:flex;gap:5px;margin-bottom:14px;}
.subtab{flex:1;text-align:center;padding:9px 0;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;color:var(--ink-dim);border:1px solid var(--line);transition:all .2s ease;}
.subtab:hover{color:var(--ink);}
.subtab.active{background:rgba(255,45,120,0.12);color:var(--pink);border-color:rgba(255,45,120,0.3);}
.folder-card{background:var(--bg-3);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;transition:all .2s ease;}
.folder-card:hover{border-color:var(--line-strong);}
.folder-head{display:flex;justify-content:space-between;align-items:center;}
.folder-name{font-weight:700;font-size:14px;}
.folder-count{font-size:12px;color:var(--ink-dim);}
.folder-actions{display:flex;gap:6px;margin-top:10px;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);}
.setting-row:last-child{border-bottom:none;}
.setting-label{font-size:13px;font-weight:500;}
.setting-desc{font-size:11px;color:var(--ink-faint);margin-top:2px;}
.setting-control{display:flex;align-items:center;gap:8px;}
.setting-control input[type="number"]{width:70px;background:var(--bg-3);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:8px 10px;font-size:14px;text-align:center;}
.setting-control select{background:var(--bg-3);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:8px 12px;font-size:13px;font-family:inherit;}
.toggle{width:44px;height:24px;background:var(--bg-4);border-radius:12px;position:relative;cursor:pointer;transition:all .2s ease;border:1px solid var(--line);}
.toggle.on{background:var(--pink);border-color:var(--pink);}
.toggle-knob{width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:all .2s ease;box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.toggle.on .toggle-knob{left:22px;}
.pattern-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.pattern-item{background:var(--bg-3);border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s ease;}
.pattern-item:hover{border-color:var(--ink-dim);}
.pattern-item.selected{border-color:var(--pink);background:rgba(255,45,120,0.08);box-shadow:0 0 12px rgba(255,45,120,0.1);}
.pattern-item .pattern-name{font-size:12px;font-weight:700;color:var(--ink);}
.pattern-item .pattern-desc{font-size:10px;color:var(--ink-dim);margin-top:2px;}
.lobby-players{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0;}
.lobby-player{background:var(--bg-3);border:1px solid var(--line);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--ink);animation:playerJoin 0.3s ease;}
@keyframes playerJoin{from{transform:scale(0.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.round-indicator{display:flex;align-items:center;justify-content:center;gap:6px;margin:10px 0;}
.round-dot{width:10px;height:10px;border-radius:50%;background:var(--bg-4);border:1px solid var(--line);transition:all .3s ease;}
.round-dot.active{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px var(--gold-glow);}
.round-dot.completed{background:var(--green);border-color:var(--green);}
.error{color:var(--pink);font-size:13px;margin-top:8px;text-align:center;font-weight:500;}
.note{color:var(--ink-dim);font-size:12px;margin-top:10px;line-height:1.6;}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
.confetti-piece{position:absolute;width:10px;height:10px;background:var(--gold);animation:confettiFall 3s ease-out forwards;}
@keyframes confettiFall{0%{transform:translateY(-10vh) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bg-4);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--ink-faint);}
@media(min-width:768px){.app{max-width:560px;}.app-wide{max-width:1000px;}.logo{font-size:64px;}.cell{font-size:12.5px;}}
.hidden{display:none !important;}
.qr-wrap{text-align:center;}
.qr-img{display:block;margin:10px auto;border-radius:var(--radius);background:#fff;padding:10px;}
.screen-code{font-family:'Bebas Neue';font-size:80px;letter-spacing:16px;text-align:center;color:var(--gold);text-shadow:0 0 40px var(--gold-glow);}
.screen-players{font-size:18px;color:var(--ink-dim);text-align:center;margin-top:8px;}
.screen-now-playing{font-size:28px;font-weight:700;text-align:center;margin-top:20px;color:var(--ink);}
.screen-artist{font-size:18px;color:var(--ink-dim);text-align:center;margin-top:4px;}
.visualizer{display:flex;align-items:flex-end;justify-content:center;gap:3px;height:30px;margin:10px 0;}
.visualizer-bar{width:4px;background:linear-gradient(to top,var(--pink),var(--gold));border-radius:2px;animation:vizBounce 0.5s ease-in-out infinite alternate;}
@keyframes vizBounce{from{height:4px;}to{height:100%;}}
</style>

<body>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>
<div class="particles" id="particles"></div>
<div class="app" id="app">
  <div class="logo-wrap">
    <div class="logo">MUSIC BINGO</div>
    <div class="logo-sub">Rockstar Edition</div>
  </div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="host"><span class="tab-icon">&#127908;</span>Ведущий</div>
    <div class="tab" data-tab="join"><span class="tab-icon">&#127918;</span>Игроки</div>
    <div class="tab" data-tab="screen"><span class="tab-icon">&#128250;</span>Экран</div>
  </div>
  <div id="view"></div>
</div>
<audio id="audio" style="display:none;"></audio>
<script src="/socket.io/socket.io.js"></script>
<script>
// ===== UTILS =====
const socket = io({ transports: ['websocket', 'polling'] });
const root = document.getElementById('view');
const audioEl = document.getElementById('audio');
let audioUnlocked = false;

function unlockAudio(){ audioUnlocked = true; audioEl.play().catch(function(){}); }
function playSong(song){
  if(!song || !song.url || !audioUnlocked) return;
  audioEl.src = song.url;
  if(song.startMs) audioEl.currentTime = song.startMs / 1000;
  audioEl.play().catch(function(){});
}
function stopAudio(){ audioEl.pause(); audioEl.currentTime = 0; }
function pauseAudio(){ audioEl.pause(); }
function resumeAudio(){ audioEl.play().catch(function(){}); }

// ===== TOAST =====
function toast(msg, type){
  type = type || 'info';
  var colors = {info:'#00e5ff', success:'#00e676', error:'#ff2d78', warn:'#ff9100'};
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#12121a;border:1px solid '+(colors[type]||colors.info)+';color:#f0f0f5;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,0.3);';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(function(){t.remove();},300); }, 2500);
}

// ===== CONFETTI =====
function fireConfetti(){
  var wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;';
  var colors = ['#ffd700','#ff2d78','#00e5ff','#a855f7','#00e676','#ff9100'];
  for(var i=0;i<60;i++){
    var p = document.createElement('div');
    p.style.cssText = 'position:absolute;width:10px;height:10px;background:'+colors[Math.floor(Math.random()*colors.length)]+';animation:confettiFall 3s ease-out forwards;left:'+Math.random()*100+'%;animation-delay:'+Math.random()+'s;';
    wrap.appendChild(p);
  }
  document.body.appendChild(wrap);
  setTimeout(function(){wrap.remove();}, 4000);
}

// ===== COUNTDOWN =====
function showCountdown(num){
  var existing = document.getElementById('cd-overlay');
  if(existing) existing.remove();
  var wrap = document.createElement('div');
  wrap.id = 'cd-overlay';
  wrap.style.cssText = 'position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);';
  wrap.innerHTML = '<div style="font-family:Bebas Neue;font-size:140px;color:#ffd700;text-shadow:0 0 60px rgba(255,215,0,0.35);animation:countPop 0.8s ease;" id="cd-num">'+num+'</div><div style="font-size:14px;color:#8a8aa0;letter-spacing:4px;text-transform:uppercase;margin-top:10px;">Приготовьтесь!</div>';
  document.body.appendChild(wrap);
  var current = num;
  var interval = setInterval(function(){
    current--;
    var el = document.getElementById('cd-num');
    if(!el){ clearInterval(interval); return; }
    if(current > 0){ el.textContent = current; el.style.animation = 'none'; el.offsetHeight; el.style.animation = 'countPop 0.8s ease'; }
    else { el.textContent = 'СТАРТ!'; el.style.color = '#00e676'; clearInterval(interval); setTimeout(function(){wrap.remove();}, 800); }
  }, 1000);
}

// ===== PATTERNS =====
var PATTERNS = {
  '1line': {name:'1 линия', desc:'Одна линия'},
  '2lines': {name:'2 линии', desc:'Две линии'},
  '3lines': {name:'3 линии', desc:'Три линии'},
  '4lines': {name:'4 линии', desc:'Четыре линии'},
  'fullhouse': {name:'Полная карта', desc:'Вся карточка'},
  'corners': {name:'4 угла', desc:'Четыре угла'},
  'cross': {name:'Крест', desc:'Форма креста'},
  'outer': {name:'Внешняя рамка', desc:'Внешняя граница'},
  'letterX': {name:'Буква X', desc:'Диагональный крест'}
};

// ===== SESSION =====
var LS_KEY = 'mb_rockstar_v2';
function saveSession(obj){ try{ localStorage.setItem(LS_KEY, JSON.stringify(obj)); }catch(e){} }
function loadSession(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)); }catch(e){ return null; } }
function clearSession(){ try{ localStorage.removeItem(LS_KEY); }catch(e){} }

// ===== TABS =====
var tabs = document.querySelectorAll('.tab');
function setActiveTab(name){
  tabs.forEach(function(t){ t.classList.toggle('active', t.dataset.tab === name); });
}
tabs.forEach(function(t){ t.addEventListener('click', function(){
  setActiveTab(t.dataset.tab);
  if(t.dataset.tab === 'host') goHost();
  else if(t.dataset.tab === 'join') goJoin();
  else goScreen();
}); });

// ===== HOST =====
function goHost(){
  var session = loadSession();
  if(session && session.role === 'host' && session.code){
    socket.emit('host_rejoin', session.code, function(res){
      if(res.error){ clearSession(); renderHostSetup(); return; }
      renderHostGame(res.code, res.songs, res.settings, res);
    });
  } else { renderHostSetup(); }
}

function renderHostSetup(){
  root.innerHTML = '<div class="card" id="host-setup"><div class="subtabs"><div class="subtab active" data-sub="lib">Библиотека</div><div class="subtab" data-sub="quick">Быстро</div></div><div id="host-sub"></div><div class="error" id="host-error"></div></div><div class="card hidden" id="host-lobby"></div><div class="card hidden" id="host-game"></div>';
  document.querySelectorAll('.subtab').forEach(function(t){ t.onclick = function(){
    document.querySelectorAll('.subtab').forEach(function(x){ x.classList.remove('active'); });
    t.classList.add('active');
    t.dataset.sub === 'lib' ? drawLibrary() : drawQuick();
  }; });
  drawLibrary();
}

function drawQuick(){
  var box = document.getElementById('host-sub');
  box.innerHTML = '<label class="label">Песни (по одной на строку, минимум 9)</label><textarea class="input" id="manual" rows="8" placeholder="Исполнитель - Название песни"></textarea><button class="btn btn-pink" style="margin-top:12px;" id="q-create">Создать игру</button>';
  document.getElementById('q-create').onclick = function(){
    var raw = document.getElementById('manual').value;
    var songs = raw.split('\n').map(function(s){ return s.trim(); }).filter(Boolean).map(function(t){ return {title: t, artist: '', url: null, duration: 0}; });
    if(songs.length < 9){ document.getElementById('host-error').textContent = 'Минимум 9 песен'; return; }
    showGameSettings(songs, 'quick');
  };
}

function fetchLibrary(){
  return fetch('/api/library').then(function(r){ return r.json(); });
}

function drawLibrary(){
  var box = document.getElementById('host-sub');
  box.innerHTML = '<div class="note" style="text-align:center;padding:20px;">Загрузка...</div>';
  fetchLibrary().then(function(lib){
    var slugs = Object.keys(lib);
    var html = '<div class="row2" style="margin-bottom:14px;"><input class="input" id="nf-name" placeholder="Название новой папки"><button class="btn btn-ghost btn-sm" style="flex:0 0 auto;" id="nf-btn">+ Папка</button></div><div id="flist">';
    if(slugs.length === 0) html += '<div class="note" style="text-align:center;padding:20px;">Пока нет папок.</div>';
    slugs.forEach(function(slug){
      html += '<div class="folder-card" data-slug="'+slug+'"><div class="folder-head"><span class="folder-name">'+lib[slug].name+'</span><span class="folder-count">'+lib[slug].count+' песен</span></div><div class="folder-actions"><button class="btn btn-pink btn-sm mb-play" data-slug="'+slug+'" data-count="'+lib[slug].count+'">Создать игру</button><button class="btn btn-ghost btn-sm mb-manage" data-slug="'+slug+'" data-name="'+lib[slug].name+'">Управление</button></div><div class="folder-expand" style="display:none;margin-top:12px;"></div></div>';
    });
    html += '</div>';
    box.innerHTML = html;
    document.getElementById('nf-btn').onclick = function(){
      var name = document.getElementById('nf-name').value.trim();
      if(!name) return;
      fetch('/api/library/folder', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:name})}).then(function(){ drawLibrary(); });
    };
    box.querySelectorAll('.mb-play').forEach(function(btn){
      btn.onclick = function(){
        var card = btn.closest('.folder-card').querySelector('.folder-expand');
        card.style.display = 'block';
        var count = +btn.dataset.count;
        var defaultN = Math.min(25, count);
        card.innerHTML = '<label class="label">Сколько песен (из '+count+')</label><input class="input" type="number" id="c-'+btn.dataset.slug+'" value="'+defaultN+'" min="9" max="'+count+'"><button class="btn btn-pink btn-sm" style="width:100%;margin-top:10px;" id="s-'+btn.dataset.slug+'">Далее: Настройки</button>';
        document.getElementById('s-'+btn.dataset.slug).onclick = function(){
          var n = +document.getElementById('c-'+btn.dataset.slug).value || defaultN;
          fetch('/api/library/'+btn.dataset.slug).then(function(r){ return r.json(); }).then(function(data){
            showGameSettings(data.songs.slice(0, n), 'library');
          });
        };
      };
    });
    box.querySelectorAll('.mb-manage').forEach(function(btn){
      btn.onclick = function(){
        var card = btn.closest('.folder-card').querySelector('.folder-expand');
        card.style.display = 'block';
        fetch('/api/library/'+btn.dataset.slug).then(function(r){ return r.json(); }).then(function(data){
          var h = '<label class="label">Загрузить MP3 в '+btn.dataset.name+'</label><input type="file" accept="audio/*" multiple class="input" style="padding:8px;" id="up-'+btn.dataset.slug+'"><div style="margin-top:10px;max-height:260px;overflow-y:auto;">';
          data.songs.forEach(function(s){
            h += '<div class="song-row"><div class="song-info"><div class="song-title">'+s.title+'</div></div><span class="remove" data-url="'+s.url+'">x</span></div>';
          });
          h += '</div><button class="btn btn-danger btn-sm" style="width:100%;margin-top:12px;" id="del-'+btn.dataset.slug+'">Удалить папку</button>';
          card.innerHTML = h;
          document.getElementById('up-'+btn.dataset.slug).onchange = function(e){
            var files = Array.from(e.target.files || []);
            if(!files.length) return;
            var fd = new FormData();
            files.forEach(function(f){ fd.append('songs', f); });
            fd.append('folderName', btn.dataset.name);
            fetch('/api/library/'+btn.dataset.slug+'/upload', {method:'POST', body: fd}).then(function(){ drawLibrary(); });
          };
          card.querySelectorAll('.remove').forEach(function(r){
            r.onclick = function(){
              fetch('/api/library/'+btn.dataset.slug+'/song', {method:'DELETE', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url: r.dataset.url})}).then(function(){ btn.onclick(); });
            };
          });
          document.getElementById('del-'+btn.dataset.slug).onclick = function(){
            if(!confirm('Удалить?')) return;
            fetch('/api/library/'+btn.dataset.slug, {method:'DELETE'}).then(function(){ drawLibrary(); });
          };
        });
      };
    });
  });
}

function showGameSettings(songs, source){
  var setup = document.getElementById('host-setup');
  var size = Math.min(7, Math.max(3, Math.floor(Math.sqrt(songs.length))));
  setup.innerHTML = '<div class="title-md" style="text-align:center;margin-bottom:16px;">Настройки игры</div>'+
    '<div class="setting-row"><div><div class="setting-label">Размер карточки</div><div class="setting-desc">'+size+'x'+size+' = '+(size*size)+' ячеек</div></div><div class="setting-control"><input type="number" id="set-size" value="'+size+'" min="3" max="7"></div></div>'+
    '<div class="setting-row"><div><div class="setting-label">Целевой узор</div></div></div>'+
    '<div class="pattern-grid" id="pg"></div>'+
    '<div class="setting-row" style="margin-top:14px;"><div><div class="setting-label">Длительность отрывка</div></div><div class="setting-control"><input type="number" id="set-snippet" value="30" min="5" max="300"> сек</div></div>'+
    '<div class="setting-row"><div><div class="setting-label">Пауза между песнями</div></div><div class="setting-control"><input type="number" id="set-gap" value="5" min="0" max="60"> сек</div></div>'+
    '<div class="setting-row"><div><div class="setting-label">Автовоспроизведение</div></div><div class="setting-control" id="ap-wrap"></div></div>'+
    '<div class="setting-row"><div><div class="setting-label">Раунды</div></div><div class="setting-control"><input type="number" id="set-rounds" value="1" min="1" max="10"></div></div>'+
    '<div class="row2" style="margin-top:16px;"><button class="btn btn-ghost" id="set-back">Назад</button><button class="btn btn-pink" id="set-create">Создать лобби</button></div>'+
    '<div class="error" id="set-err"></div>';

  var pg = document.getElementById('pg');
  var selectedPattern = '1line';
  Object.entries(PATTERNS).forEach(function(entry){
    var id = entry[0], p = entry[1];
    var div = document.createElement('div');
    div.className = 'pattern-item' + (id === selectedPattern ? ' selected' : '');
    div.innerHTML = '<div class="pattern-name">'+p.name+'</div><div class="pattern-desc">'+p.desc+'</div>';
    div.onclick = function(){ pg.querySelectorAll('.pattern-item').forEach(function(x){ x.classList.remove('selected'); }); div.classList.add('selected'); selectedPattern = id; };
    pg.appendChild(div);
  });

  var autoplay = true;
  var toggle = document.createElement('div');
  toggle.className = 'toggle on';
  toggle.innerHTML = '<div class="toggle-knob"></div>';
  toggle.onclick = function(){ autoplay = !autoplay; toggle.classList.toggle('on'); };
  document.getElementById('ap-wrap').appendChild(toggle);

  document.getElementById('set-back').onclick = function(){ source === 'quick' ? renderHostSetup() : drawLibrary(); };
  document.getElementById('set-create').onclick = function(){
    var err = document.getElementById('set-err');
    err.textContent = '';
    var cardSize = +document.getElementById('set-size').value;
    var snippetSeconds = +document.getElementById('set-snippet').value;
    var gapSeconds = +document.getElementById('set-gap').value;
    var rounds = +document.getElementById('set-rounds').value;
    if(cardSize < 3 || cardSize > 7){ err.textContent = 'Размер карточки: 3-7'; return; }
    if(cardSize * cardSize > songs.length){ err.textContent = 'Нужно '+(cardSize*cardSize)+' песен для '+cardSize+'x'+cardSize; return; }
    var settings = {cardSize:cardSize, pattern:selectedPattern, snippetSeconds:snippetSeconds, gapSeconds:gapSeconds, autoPlay:autoplay, rounds:rounds};
    socket.emit('create_game', {songs:songs, settings:settings}, function(res){
      if(res.error){ err.textContent = res.error; return; }
      saveSession({role: 'host', code: res.code, settings:settings});
      unlockAudio();
      renderHostLobby(res.code, res.songs, res.settings, res.round);
    });
  };
}

function renderHostLobby(code, songs, settings, round){
  document.getElementById('host-setup').classList.add('hidden');
  var lobby = document.getElementById('host-lobby');
  lobby.classList.remove('hidden');
  var dots = '';
  for(var i=0; i<settings.rounds; i++) dots += '<div class="round-dot '+(i===0?'active':'')+'"></div>';
  lobby.innerHTML = '<div class="code-hint">Код игры</div><div class="code-display">'+code+'</div>'+
    '<div class="share-row"><span>Ссылка:</span><input readonly value="'+location.origin+'/?view=join&code='+code+'" onclick="this.select()"><button class="copy-btn" onclick="navigator.clipboard.writeText(this.previousElementSibling.value);toast(\'Скопировано!\')">Копировать</button></div>'+
    '<div class="pill-wrap"><span class="pill pill-pink">'+PATTERNS[settings.pattern].name+'</span><span class="pill pill-gold">'+settings.cardSize+'x'+settings.cardSize+'</span><span class="pill pill-cyan">'+settings.snippetSeconds+'с</span><span class="pill">'+songs.length+' песен</span></div>'+
    '<div class="title-sm" style="text-align:center;margin:16px 0 8px;">Игроки в лобби</div><div class="lobby-players" id="lobby-players"><div class="lobby-player" style="opacity:0.5;">Ожидание...</div></div>'+
    '<div class="round-indicator">'+dots+'</div>'+
    '<button class="btn btn-pink" style="margin-top:14px;" id="start-btn">Начать игру!</button>'+
    '<button class="btn btn-danger" id="cancel-btn">Отмена</button>';
  document.getElementById('start-btn').onclick = function(){ socket.emit('start_game', code); };
  document.getElementById('cancel-btn').onclick = function(){ clearSession(); location.reload(); };
}

function renderHostGame(code, songs, settings, state){
  document.getElementById('host-setup').classList.add('hidden');
  document.getElementById('host-lobby').classList.add('hidden');
  var panel = document.getElementById('host-game');
  panel.classList.remove('hidden');

  var revealed = state.revealed || [];
  var playerCount = state.playerCount || 0;
  var winner = state.winner || null;
  var pendingClaim = state.pendingClaim || null;
  var status = state.status || 'lobby';
  var round = state.round || 1;
  var currentSong = state.currentSong || null;
  var snippetProgress = 0;
  var progressInterval = null;

  function draw(){
    var isPlaying = status === 'playing';
    var isPaused = status === 'paused';
    var isEnded = status === 'ended';
    var html = '<div class="pill-wrap"><span class="pill pill-pink">Раунд '+round+' / '+settings.rounds+'</span><span class="pill pill-gold">'+PATTERNS[settings.pattern].name+'</span><span class="pill">'+playerCount+' игроков</span></div>';

    if(currentSong){
      html += '<div class="now-playing"><div class="now-playing-label">СЕЙЧАС ИГРАЕТ</div><div class="now-playing-title">'+currentSong.title+'</div>'+(currentSong.artist?'<div class="now-playing-artist">'+currentSong.artist+'</div>':'');
      if(settings.autoPlay) html += '<div class="progress-ring-wrap"><div class="progress-ring"><svg width="60" height="60" viewBox="0 0 60 60"><circle class="progress-ring-bg" cx="30" cy="30" r="26"/><circle class="progress-ring-fill" cx="30" cy="30" r="26" stroke-dasharray="163.36" stroke-dashoffset="'+(163.36*(1-snippetProgress))+'"/></svg><div class="progress-ring-text">'+Math.ceil((1-snippetProgress)*settings.snippetSeconds)+'</div></div></div>';
      html += '<div class="visualizer" id="viz"></div></div>';
    } else if(isPlaying) html += '<div class="note" style="text-align:center;padding:20px;">Загрузка следующей песни...</div>';

    if(winner) html += '<div class="winner-banner">'+winner+'</div>';
    if(pendingClaim && !winner) html += '<div class="claim-banner"><div><b>'+pendingClaim.name+'</b> заявляет БИНГО!</div><div class="claim-actions"><button class="btn btn-green btn-sm" style="flex:1;" id="verify-btn">Подтвердить</button><button class="btn btn-danger btn-sm" style="flex:1;" id="reject-btn">Отклонить</button></div></div>';

    if(isEnded && round < settings.rounds) html += '<div class="card card-glow-gold" style="text-align:center;"><div class="title-sm">Раунд '+round+' завершён!</div><button class="btn btn-gold" id="next-round-btn">Следующий раунд</button></div>';
    if(isEnded && round >= settings.rounds) html += '<div class="card card-glow-gold" style="text-align:center;"><div class="winner-banner">ИГРА ОКОНЧЕНА!</div><button class="btn btn-pink" id="restart-btn">Новая игра</button></div>';

    html += '<div class="row3" style="margin-top:10px;">';
    if(isPlaying) html += '<button class="btn btn-orange btn-sm" id="skip-btn">Пропустить</button><button class="btn btn-ghost btn-sm" id="pause-btn">Пауза</button>';
    if(isPaused) html += '<button class="btn btn-green btn-sm" id="resume-btn">Продолжить</button><button class="btn btn-orange btn-sm" id="next-btn">Далее</button>';
    if(!isPlaying && !isPaused && !isEnded && status === 'lobby') html += '<button class="btn btn-pink btn-sm" id="start-lobby">Начать</button>';
    html += '</div><button class="btn btn-danger" style="margin-top:8px;" id="leave-btn">Завершить игру</button>';

    html += '<div style="margin-top:16px;"><div class="label">Песни ('+revealed.length+'/'+songs.length+')</div>';
    songs.forEach(function(s){ html += '<div class="song-row '+(revealed.includes(s.title)?'revealed':'')+'"><div class="song-info"><div class="song-title">'+s.title+'</div></div>'+(revealed.includes(s.title)?'<span class="badge">сыграна</span>':'')+'</div>'; });
    html += '</div>';
    panel.innerHTML = html;

    var viz = document.getElementById('viz');
    if(viz && isPlaying){ for(var i=0;i<12;i++){ var bar=document.createElement('div'); bar.className='visualizer-bar'; bar.style.animationDelay=(i*0.1)+'s'; bar.style.height=(20+Math.random()*80)+'%'; viz.appendChild(bar);} }

    var skipBtn = document.getElementById('skip-btn'); if(skipBtn) skipBtn.onclick = function(){ socket.emit('skip_song', code); };
    var pauseBtn = document.getElementById('pause-btn'); if(pauseBtn) pauseBtn.onclick = function(){ socket.emit('pause_game', code); };
    var resumeBtn = document.getElementById('resume-btn'); if(resumeBtn) resumeBtn.onclick = function(){ socket.emit('resume_game', code); };
    var nextBtn = document.getElementById('next-btn'); if(nextBtn) nextBtn.onclick = function(){ socket.emit('reveal_next', code); };
    var startLobby = document.getElementById('start-lobby'); if(startLobby) startLobby.onclick = function(){ socket.emit('start_game', code); };
    var nextRoundBtn = document.getElementById('next-round-btn'); if(nextRoundBtn) nextRoundBtn.onclick = function(){ socket.emit('next_round', code); };
    var restartBtn = document.getElementById('restart-btn'); if(restartBtn) restartBtn.onclick = function(){ socket.emit('reset_game', code, function(){location.reload();}); };
    var verifyBtn = document.getElementById('verify-btn'); if(verifyBtn) verifyBtn.onclick = function(){ socket.emit('verify_bingo', code); };
    var rejectBtn = document.getElementById('reject-btn'); if(rejectBtn) rejectBtn.onclick = function(){ socket.emit('reject_bingo', code); };
    document.getElementById('leave-btn').onclick = function(){ if(!confirm('Завершить игру?')) return; clearSession(); location.href = location.pathname; };
  }

  function startProgress(){ if(progressInterval) clearInterval(progressInterval); snippetProgress = 0; var step = 1/(settings.snippetSeconds||30); progressInterval = setInterval(function(){ snippetProgress += step; if(snippetProgress >= 1) snippetProgress = 1; draw(); }, 1000); }
  function stopProgress(){ if(progressInterval){ clearInterval(progressInterval); progressInterval = null; } }

  draw();

  socket.on('players_update', function(data){ playerCount = data.count; draw(); });
  socket.on('winner_update', function(data){ winner = data.winner; stopProgress(); fireConfetti(); draw(); });
  socket.on('bingo_claim', function(data){ pendingClaim = data; draw(); });
  socket.on('bingo_claim_cleared', function(){ pendingClaim = null; draw(); });
  socket.on('game_update', function(data){ revealed = data.revealed; currentSong = data.currentSong; status = data.status || status; round = data.round || round; if(data.currentSong){ playSong(data.currentSong); startProgress(); } draw(); });
  socket.on('game_started', function(data){ status = 'playing'; round = data.round; draw(); showCountdown(3); });
  socket.on('game_paused', function(){ status = 'paused'; stopProgress(); pauseAudio(); draw(); });
  socket.on('game_resumed', function(){ status = 'playing'; resumeAudio(); startProgress(); draw(); });
  socket.on('round_ended', function(){ status = 'ended'; stopProgress(); stopAudio(); draw(); });
  socket.on('new_round', function(data){ status = 'lobby'; round = data.round; revealed = []; currentSong = null; winner = null; pendingClaim = null; stopProgress(); stopAudio(); draw(); toast('Раунд '+round+' начинается!'); });
  socket.on('game_ended', function(){ status = 'ended'; stopProgress(); stopAudio(); draw(); fireConfetti(); });
  socket.on('song_ended', function(){ stopProgress(); });
  socket.on('song_skipped', function(){ stopProgress(); });
}

// ===== PLAYER =====
function goJoin(){
  var session = loadSession();
  if(session && session.role === 'player' && session.code){
    doJoin(session.code, session.name || 'Игрок');
  } else { renderJoinForm(); }
}

function renderJoinForm(){
  var prefill = new URLSearchParams(location.search).get('code') || '';
  root.innerHTML = '<div class="card"><div class="title-md" style="text-align:center;margin-bottom:16px;">Присоединиться к игре</div><label class="label">Ваше имя</label><input class="input" id="join-name" placeholder="Ваше имя" style="margin-bottom:14px;"><label class="label">Код игры</label><input class="input input-code" id="join-code" maxlength="4" value="'+prefill+'" placeholder="XXXX"><button class="btn btn-pink" style="margin-top:16px;" id="join-btn">Присоединиться</button><div class="error" id="join-error"></div></div>';
  document.getElementById('join-btn').onclick = function(){
    var code = document.getElementById('join-code').value.trim().toUpperCase();
    var name = document.getElementById('join-name').value.trim() || 'Игрок';
    doJoin(code, name);
  };
}

function doJoin(code, name){
  var err = document.getElementById('join-error');
  if(err) err.textContent = '';
  if(code.length !== 4){ if(err) err.textContent = 'Код состоит из 4 символов'; return; }
  socket.emit('join_game', {code:code, name:name}, function(res){
    if(res.error){ if(err) err.textContent = res.error; clearSession(); return; }
    saveSession({role: 'player', code:code, name:name});
    renderPlayerCard(code, name, res);
  });
}

function renderPlayerCard(code, name, initial){
  var cardTitles = initial.cardTitles;
  var size = initial.size;
  var freeIndex = initial.freeIndex;
  var totalSongs = initial.totalSongs;
  var pattern = initial.pattern;
  var patternName = initial.patternName;
  var marks = initial.marks;
  var revealed = initial.revealed;
  var winner = initial.winner;
  var status = initial.status || 'lobby';
  var round = initial.round || 1;
  var totalRounds = initial.totalRounds || 1;
  var claimState = 'idle';
  var currentSong = initial.currentSong || null;

  function checkBingoLocal(){
    var pid = pattern || '1line';
    for(var r=0; r<size; r++){
      var row=true, col=true;
      for(var c=0; c<size; c++){ if(!marks[r*size+c]) row=false; if(!marks[c*size+r]) col=false; }
      if(row || col) return true;
    }
    var d1=true, d2=true;
    for(var i=0; i<size; i++){ if(!marks[i*size+i]) d1=false; if(!marks[i*size+(size-1-i)]) d2=false; }
    if(d1 || d2) return true;
    if(pid === 'fullhouse'){ for(var i=0; i<marks.length; i++) if(!marks[i]) return false; return true; }
    if(pid === 'corners'){ if(size<3) return false; return marks[0] && marks[size-1] && marks[size*(size-1)] && marks[size*size-1]; }
    if(pid === 'cross'){ if(size<3) return false; var mid=Math.floor(size/2); var r=true,c=true; for(var i=0;i<size;i++){ if(!marks[mid*size+i]) r=false; if(!marks[i*size+mid]) c=false; } return r&&c; }
    if(pid === 'outer'){ for(var r=0;r<size;r++) for(var c=0;c<size;c++) if(r===0||r===size-1||c===0||c===size-1) if(!marks[r*size+c]) return false; return true; }
    if(pid === 'letterX'){ var x1=true,x2=true; for(var i=0;i<size;i++){ if(!marks[i*size+i]) x1=false; if(!marks[i*size+(size-1-i)]) x2=false; } return x1&&x2; }
    return false;
  }

  function draw(){
    var revealedSet = new Set(revealed);
    var bingo = checkBingoLocal();
    var isLobby = status === 'lobby';
    var isPlaying = status === 'playing';
    var isPaused = status === 'paused';
    var isEnded = status === 'ended';

    var html = '<div class="card">';
    if(winner) html += '<div class="winner-banner">'+winner+'</div>';
    else if(bingo && claimState === 'idle' && isPlaying) html += '<div class="bingo-banner">БИНГО!</div>';
    if(claimState === 'rejected') html += '<div class="reject-banner">Не подтверждено - продолжайте игру!</div>';
    if(claimState === 'pending') html += '<div class="note" style="text-align:center;">Ведущий проверяет...</div>';

    html += '<div class="pill-wrap"><span class="pill pill-pink">Раунд '+round+'/'+totalRounds+'</span><span class="pill pill-gold">'+(patternName||pattern)+'</span><span class="pill">'+revealed.length+'/'+totalSongs+'</span></div>';

    if(currentSong){ html += '<div class="now-playing" style="padding:12px;"><div class="now-playing-label" style="font-size:9px;">СЕЙЧАС ИГРАЕТ</div><div class="now-playing-title" style="font-size:15px;">'+currentSong.title+'</div>'+(currentSong.artist?'<div class="now-playing-artist">'+currentSong.artist+'</div>':'')+'</div>'; }
    if(isLobby) html += '<div class="note" style="text-align:center;padding:20px;"><div style="font-size:32px;margin-bottom:10px;">...</div><div style="font-weight:700;font-size:16px;">Ожидание начала</div></div>';
    if(isPaused) html += '<div class="note" style="text-align:center;padding:16px;"><div style="font-size:28px;margin-bottom:8px;">||</div><div style="font-weight:700;">Пауза</div></div>';
    if(isEnded) html += '<div class="note" style="text-align:center;padding:16px;"><div style="font-size:28px;margin-bottom:8px;">#</div><div style="font-weight:700;">Раунд завершён!</div></div>';

    html += '<div class="grid-wrap"><div class="grid" style="grid-template-columns:repeat('+size+',1fr);">';
    cardTitles.forEach(function(title, i){
      var cls = 'cell';
      if(i === freeIndex) cls += ' free';
      else if(marks[i]) cls += ' hit';
      else if(revealedSet.has(title)) cls += ' ready';
      html += '<div class="'+cls+'" data-i="'+i+'">'+(i===freeIndex?'ФРИ':title)+'</div>';
    });
    html += '</div></div>';

    if(bingo && !winner && claimState === 'idle' && isPlaying) html += '<button class="btn btn-gold" style="margin-top:14px;" id="claim-btn">Заявить БИНГО!</button>';
    html += '<button class="btn btn-danger" style="margin-top:8px;" id="leave-btn">Покинуть игру</button>';
    html += '<div class="note">Нажимайте на сыгравшие песни (золотая рамка), чтобы отметить. Нажмите снова, чтобы снять отметку.</div></div>';
    root.innerHTML = html;

    root.querySelectorAll('.cell').forEach(function(el){
      var i = +el.dataset.i;
      if(i === freeIndex) return;
      el.onclick = function(){
        if(!(marks[i] || revealedSet.has(cardTitles[i]))) return;
        marks[i] = !marks[i];
        socket.emit('toggle_mark', {code:code, index:i});
        draw();
      };
    });

    var claimBtn = document.getElementById('claim-btn');
    if(claimBtn){ claimBtn.onclick = function(){ if(!confirm('Заявить БИНГО?')) return; claimState = 'pending'; socket.emit('claim_bingo', code); draw(); }; }
    document.getElementById('leave-btn').onclick = function(){ clearSession(); location.href = location.pathname + '?view=join'; };
  }

  draw();

  socket.on('game_update', function(data){ revealed = data.revealed; currentSong = data.currentSong; status = data.status || status; round = data.round || round; draw(); });
  socket.on('game_started', function(data){ status = 'playing'; round = data.round; draw(); showCountdown(3); });
  socket.on('game_paused', function(){ status = 'paused'; draw(); });
  socket.on('game_resumed', function(){ status = 'playing'; draw(); });
  socket.on('round_ended', function(){ status = 'ended'; draw(); });
  socket.on('new_round', function(data){ status = 'lobby'; round = data.round; revealed = []; currentSong = null; winner = null; claimState = 'idle'; marks = new Array(marks.length).fill(false); if(freeIndex >= 0) marks[freeIndex] = true; draw(); });
  socket.on('winner_update', function(data){ winner = data.winner; claimState = 'idle'; if(winner === name) fireConfetti(); draw(); });
  socket.on('mark_update', function(data){ marks = data.marks; draw(); });
  socket.on('bingo_rejected', function(){ claimState = 'rejected'; draw(); setTimeout(function(){ claimState='idle'; draw(); }, 4000); });
}

// ===== SCREEN =====
function goScreen(){
  var session = loadSession();
  if(session && session.role === 'screen' && session.code){ doScreen(session.code); }
  else { renderScreenForm(); }
}

function renderScreenForm(){
  var prefill = new URLSearchParams(location.search).get('code') || '';
  root.innerHTML = '<div class="card"><div class="title-md" style="text-align:center;margin-bottom:16px;">TV Экран</div><label class="label">Код игры</label><input class="input input-code" id="scr-code" maxlength="4" value="'+prefill+'" placeholder="XXXX"><button class="btn btn-pink" style="margin-top:16px;" id="scr-go">Показать</button><div class="error" id="scr-error"></div></div>';
  document.getElementById('scr-go').onclick = function(){ doScreen(document.getElementById('scr-code').value.trim().toUpperCase()); };
}

function doScreen(code){
  var err = document.getElementById('scr-error');
  if(code.length !== 4){ if(err) err.textContent = 'Код состоит из 4 символов'; return; }
  socket.emit('join_game', {code:code, name: '__screen__'}, function(res){
    if(res.error){ if(err) err.textContent = res.error; clearSession(); return; }
    saveSession({role: 'screen', code:code});
    renderScreenView(code, res);
  });
}

function renderScreenView(code, initial){
  var playerCount = 0, winner = initial.winner || null, lastSong = null;
  var status = initial.status || 'lobby', round = initial.round || 1;
  var totalRounds = initial.totalRounds || 1, patternName = initial.patternName || '';
  var unlocked = false;
  document.getElementById('app').classList.add('app-wide');

  function draw(){
    var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=' + encodeURIComponent(location.origin + '/?view=join&code=' + code);
    var html = '<div class="card" style="text-align:center;padding:30px;"><img class="qr-img" src="'+qrUrl+'" width="260" height="260" alt="QR"><div class="screen-code">'+code+'</div><div class="screen-players">'+playerCount+' игроков онлайн</div>';
    html += '<div class="pill-wrap" style="margin-top:16px;"><span class="pill pill-pink">Раунд '+round+'/'+totalRounds+'</span><span class="pill pill-gold">'+patternName+'</span></div>';
    if(winner) html += '<div class="winner-banner" style="font-size:56px;margin-top:20px;">'+winner+'</div><div style="font-size:20px;color:#ffd700;margin-top:8px;">ПОБЕДИТЕЛЬ!</div>';
    else if(lastSong) html += '<div class="screen-now-playing" style="margin-top:24px;">'+lastSong.title+'</div>'+(lastSong.artist?'<div class="screen-artist">'+lastSong.artist+'</div>':'')+'<div class="visualizer" style="margin-top:16px;height:40px;" id="scr-viz"></div>';
    else html += '<div style="font-size:24px;color:#8a8aa0;margin-top:30px;">'+(status==='lobby'?'Ожидание...':(status==='paused'?'Пауза':(status==='ended'?'Раунд завершён':'Скоро начнём!')))+'</div>';
    if(!unlocked) html += '<button class="btn btn-ghost" style="margin-top:20px;max-width:300px;margin-left:auto;margin-right:auto;" id="en-sound">Включить звук</button>';
    html += '</div>';
    root.innerHTML = html;

    var viz = document.getElementById('scr-viz');
    if(viz && !winner && lastSong){ for(var i=0;i<16;i++){ var bar=document.createElement('div'); bar.className='visualizer-bar'; bar.style.animationDelay=(i*0.08)+'s'; bar.style.height=(15+Math.random()*85)+'%'; viz.appendChild(bar);} }

    var soundBtn = document.getElementById('en-sound');
    if(soundBtn) soundBtn.onclick = function(){ unlocked = true; unlockAudio(); draw(); };
  }

  draw();
  socket.on('players_update', function(data){ playerCount = data.count; draw(); });
  socket.on('winner_update', function(data){ winner = data.winner; draw(); });
  socket.on('game_update', function(data){ lastSong = data.currentSong; status = data.status || status; round = data.round || round; if(unlocked && data.currentSong) playSong(data.currentSong); draw(); });
  socket.on('game_started', function(data){ status = 'playing'; round = data.round; draw(); showCountdown(3); });
  socket.on('game_paused', function(){ status = 'paused'; pauseAudio(); draw(); });
  socket.on('game_resumed', function(){ status = 'playing'; resumeAudio(); draw(); });
  socket.on('round_ended', function(){ status = 'ended'; stopAudio(); draw(); });
  socket.on('new_round', function(data){ status = 'lobby'; round = data.round; winner = null; lastSong = null; draw(); });
  socket.on('countdown', function(data){ if(data.count > 0) showCountdown(data.count); });
}

// ===== INIT =====
var session = loadSession();
var iv = new URLSearchParams(location.search).get('view') || new URLSearchParams(location.search).get('tab');
if(iv === 'join'){ setActiveTab('join'); goJoin(); }
else if(iv === 'screen'){ setActiveTab('screen'); goScreen(); }
else if(iv === 'host'){ setActiveTab('host'); goHost(); }
else if(session && session.role === 'host'){ setActiveTab('host'); goHost(); }
else if(session && session.role === 'player'){ setActiveTab('join'); goJoin(); }
else if(session && session.role === 'screen'){ setActiveTab('screen'); goScreen(); }
else { setActiveTab('host'); renderHostSetup(); }

socket.on('connect', function(){
  var s = loadSession();
  if(s && s.role === 'host' && s.code) socket.emit('host_rejoin', s.code);
  else if(s && s.role === 'player' && s.code && s.name) doJoin(s.code, s.name);
  else if(s && s.role === 'screen' && s.code) doScreen(s.code);
});
</script>
