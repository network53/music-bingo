<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Music Bingo - Rockstar Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&display=swap');
:root{--bg:#0a0a0f;--bg-2:#12121a;--bg-3:#1a1a28;--bg-4:#222236;--pink:#ff2d78;--pink-glow:rgba(255,45,120,0.35);--gold:#ffd700;--gold-glow:rgba(255,215,0,0.35);--cyan:#00e5ff;--cyan-glow:rgba(0,229,255,0.25);--violet:#a855f7;--violet-glow:rgba(168,85,247,0.25);--green:#00e676;--green-glow:rgba(0,230,118,0.25);--orange:#ff9100;--orange-glow:rgba(255,145,0,0.25);--ink:#f0f0f5;--ink-dim:#8a8aa0;--ink-faint:#55556b;--line:rgba(255,255,255,0.06);--line-strong:rgba(255,255,255,0.12);--radius:16px;--radius-sm:10px;}
*{box-sizing:border-box;margin:0;padding:0;}html{scroll-behavior:smooth;}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;}
.bg-orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.15;pointer-events:none;z-index:0;animation:orbFloat 20s ease-in-out infinite;}
.bg-orb-1{width:600px;height:600px;background:var(--pink);top:-200px;left:-200px;animation-delay:0s;}
.bg-orb-2{width:500px;height:500px;background:var(--violet);bottom:-150px;right:-150px;animation-delay:-7s;}
.bg-orb-3{width:400px;height:400px;background:var(--cyan);top:40%;left:60%;animation-delay:-14s;}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(30px,-40px) scale(1.1);}66%{transform:translate(-20px,30px) scale(0.95);}}
.particles{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
.particle{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:0;animation:particleRise 8s linear infinite;}
@keyframes particleRise{0%{transform:translateY(100vh) scale(0);opacity:0;}10%{opacity:0.6;}90%{opacity:0.6;}100%{transform:translateY(-10vh) scale(1);opacity:0;}}
.app{position:relative;z-index:2;max-width:520px;margin:0 auto;padding:16px;}
.app-wide{max-width:900px;}
.logo-wrap{text-align:center;padding:24px 0 8px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:6px;background:linear-gradient(135deg,var(--pink),var(--gold),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 40px var(--pink-glow);line-height:1;}
.logo-sub{font-size:12.5px;color:var(--ink-dim);letter-spacing:3px;text-transform:uppercase;margin-top:4px;font-weight:500;}
.tabs{display:flex;gap:6px;background:var(--bg-2);padding:5px;border-radius:var(--radius);border:1px solid var(--line);margin:20px 0 16px;}
.tab{flex:1;text-align:center;padding:12px 0;border-radius:var(--radius-sm);font-weight:700;font-size:13px;cursor:pointer;color:var(--ink-dim);transition:all .25s ease;position:relative;overflow:hidden;}
.tab:hover{color:var(--ink);}
.tab.active{background:linear-gradient(135deg,var(--pink),#ff5c9a);color:#fff;box-shadow:0 4px 20px var(--pink-glow);}
.tab .tab-icon{font-size:16px;display:block;margin-bottom:2px;}
.card{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:14px;backdrop-filter:blur(10px);transition:all .3s ease;}
.card:hover{border-color:var(--line-strong);}
.card-glow-pink{box-shadow:0 0 30px rgba(255,45,120,0.08);border-color:rgba(255,45,120,0.15);}
.card-glow-gold{box-shadow:0 0 30px rgba(255,215,0,0.08);border-color:rgba(255,215,0,0.15);}
.label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink-dim);margin-bottom:8px;display:block;font-weight:600;}
.title-lg{font-family:'Bebas Neue';font-size:36px;letter-spacing:3px;text-align:center;}
.title-md{font-family:'Bebas Neue';font-size:28px;letter-spacing:2px;}
.title-sm{font-weight:700;font-size:16px;}
.text-dim{color:var(--ink-dim);font-size:13px;line-height:1.6;}
.text-faint{color:var(--ink-faint);font-size:12px;}
.input{width:100%;background:var(--bg-3);border:1px solid var(--line);border-radius:var(--radius-sm);color:var(--ink);padding:13px 14px;font-family:inherit;font-size:14px;transition:all .2s ease;}
.input:focus{outline:none;border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,45,120,0.1);}
.input::placeholder{color:var(--ink-faint);}
textarea.input{resize:vertical;min-height:100px;}
.input-code{text-transform:uppercase;letter-spacing:6px;font-weight:800;text-align:center;font-size:20px;}
.btn{width:100%;border:none;border-radius:var(--radius-sm);padding:14px 0;font-weight:700;font-size:15px;cursor:pointer;transition:all .2s ease;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:active{transform:scale(0.97);}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.btn-sm{width:auto;padding:9px 16px;font-size:13px;}
.btn-pink{background:linear-gradient(135deg,var(--pink),#ff5c9a);color:#fff;box-shadow:0 4px 20px var(--pink-glow);}
.btn-pink:hover{box-shadow:0 6px 30px var(--pink-glow);transform:translateY(-1px);}
.btn-gold{background:linear-gradient(135deg,var(--gold),#ffaa00);color:#1a0f00;box-shadow:0 4px 20px var(--gold-glow);}
.btn-gold:hover{box-shadow:0 6px 30px var(--gold-glow);transform:translateY(-1px);}
.btn-cyan{background:linear-gradient(135deg,var(--cyan),#00b8d4);color:#001a1f;box-shadow:0 4px 20px var(--cyan-glow);}
.btn-green{background:linear-gradient(135deg,var(--green),#00c853);color:#001f0a;box-shadow:0 4px 20px var(--green-glow);}
.btn-orange{background:linear-gradient(135deg,var(--orange),#ff6d00);color:#1a0f00;box-shadow:0 4px 20px var(--orange-glow);}
.btn-ghost{background:transparent;border:1px solid var(--line-strong);color:var(--ink);}
.btn-ghost:hover{background:var(--bg-3);border-color:var(--ink-dim);}
.btn-danger{background:transparent;border:1px solid rgba(255,45,120,0.3);color:var(--pink);}
.btn-danger:hover{background:rgba(255,45,120,0.08);}
.code-display{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:12px;text-align:center;color:var(--gold);text-shadow:0 0 30px var(--gold-glow);margin:8px 0 4px;line-height:1;}
.code-hint{text-align:center;color:var(--ink-dim);font-size:12px;margin-bottom:6px;}
.share-row{display:flex;gap:8px;align-items:center;background:var(--bg-3);border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 12px;margin-top:10px;}
.share-row input{border:none;background:transparent;color:var(--ink);flex:1;font-size:12.5px;padding:0;font-family:inherit;}
.share-row .copy-btn{background:var(--bg-4);border:none;color:var(--ink-dim);padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:600;white-space:nowrap;}
.share-row .copy-btn:hover{background:var(--pink);color:#fff;}
.song-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:13px;gap:8px;}
.song-row:last-child{border-bottom:none;}
.song-row.revealed{color:var(--gold);}
.song-row .song-info{flex:1;min-width:0;}
.song-row .song-title{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.song-row .song-artist{font-size:11px;color:var(--ink-dim);}
.badge{font-size:10px;padding:3px 10px;border-radius:20px;background:rgba(255,215,0,0.12);color:var(--gold);font-weight:700;white-space:nowrap;}
.badge-pink{background:rgba(255,45,120,0.12);color:var(--pink);}
.badge-cyan{background:rgba(0,229,255,0.12);color:var(--cyan);}
.badge-green{background:rgba(0,230,118,0.12);color:var(--green);}
.remove{color:var(--pink);cursor:pointer;font-size:18px;font-weight:700;padding:0 6px;opacity:0.7;}
.remove:hover{opacity:1;}
.grid-wrap{margin-top:10px;}
.grid{display:grid;gap:8px;margin-top:8px;}
.cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;text-align:center;font-size:11px;line-height:1.2;padding:5px;border-radius:var(--radius-sm);background:var(--bg-3);border:1.5px solid var(--line);color:var(--ink-faint);transition:all .25s cubic-bezier(.4,0,.2,1);cursor:default;position:relative;overflow:hidden;font-weight:500;}
.cell.ready{opacity:1;border-color:var(--gold);box-shadow:0 0 12px var(--gold-glow);cursor:pointer;color:var(--ink);background:var(--bg-4);}
.cell.ready:hover{transform:scale(1.04);border-color:var(--gold);}
.cell.hit{opacity:1;cursor:pointer;background:linear-gradient(135deg,var(--pink),#c2185b);color:#fff;border-color:var(--pink);box-shadow:0 0 18px var(--pink-glow);transform:scale(1.03);animation:hitPulse 2s ease-in-out infinite;}
@keyframes hitPulse{0%,100%{box-shadow:0 0 18px var(--pink-glow);}50%{box-shadow:0 0 28px var(--pink-glow),0 0 40px rgba(255,45,120,0.15);}}
.cell.free{opacity:1;background:linear-gradient(135deg,var(--gold),#ff8f00);color:#1a0f00;font-weight:800;border-color:var(--gold);box-shadow:0 0 12px var(--gold-glow);}
.bingo-banner{text-align:center;font-family:'Bebas Neue';font-size:42px;letter-spacing:5px;color:var(--gold);text-shadow:0 0 30px var(--gold-glow);margin:14px 0 6px;animation:bingoPop 0.6s cubic-bezier(.175,.885,.32,1.275);}
@keyframes bingoPop{0%{transform:scale(0.3);opacity:0;}100%{transform:scale(1);opacity:1;}}
.winner-banner{text-align:center;font-family:'Bebas Neue';font-size:48px;letter-spacing:4px;color:var(--gold);text-shadow:0 0 40px var(--gold-glow);margin:16px 0 6px;animation:winnerGlow 1.5s ease-in-out infinite;}
@keyframes winnerGlow{0%,100%{text-shadow:0 0 30px var(--gold-glow);transform:scale(1);}50%{text-shadow:0 0 50px var(--gold-glow),0 0 80px rgba(255,215,0,0.2);transform:scale(1.03);}}
.countdown-wrap{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);}
.countdown-num{font-family:'Bebas Neue';font-size:140px;color:var(--gold);text-shadow:0 0 60px var(--gold-glow);animation:countPop 0.8s cubic-bezier(.175,.885,.32,1.275);}
@keyframes countPop{0%{transform:scale(0);opacity:0;}60%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}
.countdown-label{font-size:14px;color:var(--ink-dim);letter-spacing:4px;text-transform:uppercase;margin-top:10px;}
.now-playing{background:linear-gradient(135deg,rgba(255,45,120,0.08),rgba(168,85,247,0.08));border:1px solid rgba(255,45,120,0.15);border-radius:var(--radius);padding:16px;margin:14px 0;text-align:center;}
.now-playing-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--pink);font-weight:700;}
.now-playing-title{font-size:18px;font-weight:700;margin-top:6px;color:var(--ink);}
.now-playing-artist{font-size:13px;color:var(--ink-dim);margin-top:2px;}
.now-playing-bar{height:3px;background:var(--bg-3);border-radius:2px;margin-top:12px;overflow:hidden;}
.now-playing-progress{height:100%;background:linear-gradient(90deg,var(--pink),var(--gold));border-radius:2px;transition:width 1s linear;}
.progress-ring-wrap{display:flex;align-items:center;justify-content:center;margin:10px 0;}
.progress-ring{position:relative;width:60px;height:60px;}
.progress-ring svg{transform:rotate(-90deg);}
.progress-ring-bg{fill:none;stroke:var(--bg-3);stroke-width:4;}
.progress-ring-fill{fill:none;stroke:var(--gold);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1s linear;filter:drop-shadow(0 0 4px var(--gold-glow));}
.progress-ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:18px;color:var(--gold);}
.claim-banner{background:linear-gradient(135deg,rgba(255,215,0,0.08),rgba(255,145,0,0.08));border:1px solid rgba(255,215,0,0.25);border-radius:var(--radius);padding:18px;text-align:center;margin-bottom:14px;animation:claimSlide 0.4s ease-out;}
@keyframes claimSlide{from{transform:translateY(-20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.claim-banner b{color:var(--gold);font-size:16px;}
.claim-banner .claim-actions{display:flex;gap:10px;margin-top:12px;}
.reject-banner{background:rgba(255,45,120,0.08);border:1px solid rgba(255,45,120,0.3);border-radius:var(--radius-sm);padding:12px;text-align:center;font-size:13px;margin-bottom:12px;color:var(--pink);font-weight:500;animation:shake 0.5s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
.pill-wrap{text-align:center;margin:10px 0;}
.pill{display:inline-block;background:var(--bg-3);color:var(--ink-dim);font-size:12px;font-weight:600;padding:5px 14px;border-radius:20px;border:1px solid var(--line);}
.pill-pink{background:rgba(255,45,120,0.1);color:var(--pink);border-color:rgba(255,45,120,0.2);}
.pill-gold{background:rgba(255,215,0,0.1);color:var(--gold);border-color:rgba(255,215,0,0.2);}
.pill-cyan{background:rgba(0,229,255,0.1);color:var(--cyan);border-color:rgba(0,229,255,0.2);}
.row2{display:flex;gap:10px;}
.row2 > *{flex:1;}
.row3{display:flex;gap:8px;}
.row3 > *{flex:1;}
.subtabs{display:flex;gap:5px;margin-bottom:14px;}
.subtab{flex:1;text-align:center;padding:9px 0;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;color:var(--ink-dim);border:1px solid var(--line);transition:all .2s ease;}
.subtab:hover{color:var(--ink);}
.subtab.active{background:rgba(255,45,120,0.12);color:var(--pink);border-color:rgba(255,45,120,0.3);}
.folder-card{background:var(--bg-3);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;transition:all .2s ease;}
.folder-card:hover{border-color:var(--line-strong);}
.folder-head{display:flex;justify-content:space-between;align-items:center;}
.folder-name{font-weight:700;font-size:14px;}
.folder-count{font-size:12px;color:var(--ink-dim);}
.folder-actions{display:flex;gap:6px;margin-top:10px;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);}
.setting-row:last-child{border-bottom:none;}
.setting-label{font-size:13px;font-weight:500;}
.setting-desc{font-size:11px;color:var(--ink-faint);margin-top:2px;}
.setting-control{display:flex;align-items:center;gap:8px;}
.setting-control input[type="number"]{width:70px;background:var(--bg-3);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:8px 10px;font-size:14px;text-align:center;}
.setting-control select{background:var(--bg-3);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:8px 12px;font-size:13px;font-family:inherit;}
.toggle{width:44px;height:24px;background:var(--bg-4);border-radius:12px;position:relative;cursor:pointer;transition:all .2s ease;border:1px solid var(--line);}
.toggle.on{background:var(--pink);border-color:var(--pink);}
.toggle-knob{width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:all .2s ease;box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.toggle.on .toggle-knob{left:22px;}
.pattern-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.pattern-item{background:var(--bg-3);border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s ease;}
.pattern-item:hover{border-color:var(--ink-dim);}
.pattern-item.selected{border-color:var(--pink);background:rgba(255,45,120,0.08);box-shadow:0 0 12px rgba(255,45,120,0.1);}
.pattern-item .pattern-name{font-size:12px;font-weight:700;color:var(--ink);}
.pattern-item .pattern-desc{font-size:10px;color:var(--ink-dim);margin-top:2px;}
.lobby-players{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0;}
.lobby-player{background:var(--bg-3);border:1px solid var(--line);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--ink);animation:playerJoin 0.3s ease;}
@keyframes playerJoin{from{transform:scale(0.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.round-indicator{display:flex;align-items:center;justify-content:center;gap:6px;margin:10px 0;}
.round-dot{width:10px;height:10px;border-radius:50%;background:var(--bg-4);border:1px solid var(--line);transition:all .3s ease;}
.round-dot.active{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px var(--gold-glow);}
.round-dot.completed{background:var(--green);border-color:var(--green);}
.error{color:var(--pink);font-size:13px;margin-top:8px;text-align:center;font-weight:500;}
.note{color:var(--ink-dim);font-size:12px;margin-top:10px;line-height:1.6;}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
.confetti-piece{position:absolute;width:10px;height:10px;background:var(--gold);animation:confettiFall 3s ease-out forwards;}
@keyframes confettiFall{0%{transform:translateY(-10vh) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bg-4);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--ink-faint);}
@media(min-width:768px){.app{max-width:560px;}.app-wide{max-width:1000px;}.logo{font-size:64px;}.cell{font-size:12.5px;}}
.hidden{display:none !important;}
.qr-wrap{text-align:center;}
.qr-img{display:block;margin:10px auto;border-radius:var(--radius);background:#fff;padding:10px;}
.screen-code{font-family:'Bebas Neue';font-size:80px;letter-spacing:16px;text-align:center;color:var(--gold);text-shadow:0 0 40px var(--gold-glow);}
.screen-players{font-size:18px;color:var(--ink-dim);text-align:center;margin-top:8px;}
.screen-now-playing{font-size:28px;font-weight:700;text-align:center;margin-top:20px;color:var(--ink);}
.screen-artist{font-size:18px;color:var(--ink-dim);text-align:center;margin-top:4px;}
.visualizer{display:flex;align-items:flex-end;justify-content:center;gap:3px;height:30px;margin:10px 0;}
.visualizer-bar{width:4px;background:linear-gradient(to top,var(--pink),var(--gold));border-radius:2px;animation:vizBounce 0.5s ease-in-out infinite alternate;}
@keyframes vizBounce{from{height:4px;}to{height:100%;}}
</style>
</head>
<body>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>
<div class="particles" id="particles"></div>
<div class="app" id="app">
  <div class="logo-wrap">
    <div class="logo">MUSIC BINGO</div>
    <div class="logo-sub">Rockstar Edition</div>
  </div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="host"><span class="tab-icon">&#127908;</span>Vedushiy</div>
    <div class="tab" data-tab="join"><span class="tab-icon">&#127918;</span>Igroki</div>
    <div class="tab" data-tab="screen"><span class="tab-icon">&#128250;</span>Ekran</div>
  </div>
  <div id="view"></div>
</div>
<audio id="audio" style="display:none;"></audio>
<script src="/socket.io/socket.io.js"></script>
<script>
